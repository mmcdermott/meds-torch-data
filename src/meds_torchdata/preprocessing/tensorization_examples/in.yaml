# Minimal tensorization input: tokenized event sequences for two subjects in one shard.
# `MEDSDataset.from_yaml` will reject this (list-of-list columns + not MEDS format),
# which makes the parent `StageExample.from_dir` fall back to passing this path straight
# through to yaml_to_disk — exactly what we want.
data/event_seqs/train/0.parquet:
  subject_id: [1, 2]
  time_delta_days:
    - [.nan, 1.0]
    - [.nan]
  code:
    - [[10, 11], [12]]
    - [[20, 21, 22]]
  numeric_value:
    - [[0.5, .nan], [1.5]]
    - [[.nan, 2.5, 3.5]]
