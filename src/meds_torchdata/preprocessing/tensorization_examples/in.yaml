# Minimal tensorization input: tokenized event sequences for two subjects in one shard.
# Values match `tokenization_examples/out_data.yaml`'s event_seqs output so the two stages
# can chain through `pipeline_tester` without additional data plumbing.
data/event_seqs/train/0.parquet:
  subject_id: [1, 2]
  time_delta_days:
    - [.nan, 10.0]
    - [.nan, 2.0]
  code:
    - [[10, 11], [12]]
    - [[20, 21], [22]]
  numeric_value:
    - [[0.5, 0.7], [1.2]]
    - [[5.5, 5.7], [6.2]]
