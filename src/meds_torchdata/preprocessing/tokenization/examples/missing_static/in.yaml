# Missing-static scenario: subject 1 has a static row, subject 2 does not.
# Exercises the per-subject null-static-list code path in
# `extract_statics_and_schema` (the full outer join surfaces nulls when a
# subject appears in dynamic data but not in static data).
data/train/0.parquet:
  subject_id: [1, 1, 1, 2, 2]
  time:
    - null
    - 2020-01-01 00:00:00
    - 2020-01-05 00:00:00
    - 2021-06-01 00:00:00
    - 2021-06-03 00:00:00
  code: [5, 10, 11, 20, 21]
  numeric_value: [1.0, 0.5, 0.7, 5.5, 5.7]
