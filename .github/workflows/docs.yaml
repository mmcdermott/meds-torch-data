name: Docs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build_docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # `mkdocs-git-authors-plugin` / `mkdocs-git-revision-date-localized-plugin` both walk
          # git history for per-file attribution. Without the full history the build emits
          # `has not been committed yet` warnings and revision dates are wrong / missing.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Mirror what readthedocs does: `pip install .[docs]`. Intentionally NOT `uv sync`
      # or `uv pip install` here — the whole point of this job is to catch the
      # `[project.optional-dependencies]` vs `[dependency-groups]` mismatch that breaks
      # the readthedocs build (see PR #94). If this job starts using a uv-native install
      # path it'll stop catching that class of regression.
      - name: Install package with docs extra (mirrors readthedocs)
        run: |
          python -m pip install --upgrade pip
          pip install '.[docs]'

      - name: Build docs
        # Not `--strict`: the existing API-reference generator emits griffe type-hint
        # warnings and cross-link warnings that are pre-existing and orthogonal to the
        # readthedocs failure mode this job guards against. A plain build fails hard
        # if mkdocs isn't installed (the actual RTD regression we care about) and is
        # also what readthedocs itself runs.
        run: mkdocs build
