site_name: meds-torch-data
repo_url: https://github.com/mmcdermott/meds-torch-data
site_description: Documentation for the meds-torch-data package
site_author: Matthew McDermott

nav:
  - Home: index.md
  - Stages: stages/
  - API: api/
  - Issues: https://github.com/mmcdermott/meds-torch-data/issues

theme:
  name: material
  locale: en
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - smarty
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - github-callouts

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
        - docs/gen_stage_docs.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings
  - git-authors
  - git-revision-date-localized

watch: [src]
